<svg xmlns="http://www.w3.org/2000/svg" width="1220" height="760" viewBox="0 0 1220 760" role="img" aria-labelledby="title desc">
  <title id="title">Iterative Content Refiner Architecture</title>
  <desc id="desc">Architecture diagram showing a rough draft entering a loop agent, being refined repeatedly by a refiner agent, and exiting through ExitLoopTool when the quality bar is met or when max iterations are reached.</desc>
  <defs>
    <style>
      .bg { fill: #f7f4ee; }
      .panel { fill: #fffdf8; stroke: #3d3227; stroke-width: 2; rx: 18; ry: 18; }
      .state { fill: #f3e8c8; stroke: #8b6824; stroke-width: 2; rx: 16; ry: 16; }
      .agent { fill: #dfeee7; stroke: #1d5c4c; stroke-width: 2; rx: 18; ry: 18; }
      .tool { fill: #e8ecf8; stroke: #35588d; stroke-width: 2; rx: 16; ry: 16; }
      .output { fill: #e7f0dd; stroke: #4f6f23; stroke-width: 2; rx: 16; ry: 16; }
      .note { fill: #f2ede5; stroke: #655a4f; stroke-width: 1.5; rx: 14; ry: 14; }
      .title { font: 700 28px Georgia, "Times New Roman", serif; fill: #1f1a15; }
      .label { font: 700 18px "Helvetica Neue", Arial, sans-serif; fill: #1f1a15; }
      .text { font: 15px "Helvetica Neue", Arial, sans-serif; fill: #2d2823; }
      .small { font: 13px "Helvetica Neue", Arial, sans-serif; fill: #4e473f; }
      .arrow { stroke: #2b2621; stroke-width: 2.5; fill: none; marker-end: url(#arrowhead); }
      .dashed { stroke-dasharray: 8 7; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0,0 10,4 0,8" fill="#2b2621" />
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1220" height="760" />
  <text class="title" x="60" y="58">Iterative Content Refiner Architecture</text>

  <rect class="note" x="60" y="92" width="1100" height="66" />
  <text class="text" x="84" y="120">The system is designed around a bounded loop: improve, check, exit, or continue. The important control is not only refinement quality but also a safe stopping rule.</text>
  <text class="small" x="84" y="144">Session state keeps the editorial profile stable across each pass.</text>

  <rect class="state" x="60" y="220" width="260" height="194" />
  <text class="label" x="86" y="256">Session State</text>
  <text class="small" x="86" y="284">editor:audience</text>
  <text class="small" x="86" y="308">editor:tone</text>
  <text class="small" x="86" y="332">editor:length</text>
  <text class="small" x="86" y="356">editor:quality_bar</text>

  <rect class="panel" x="60" y="470" width="260" height="132" />
  <text class="label" x="86" y="506">Rough Draft Input</text>
  <text class="text" x="86" y="536">weak announcement or</text>
  <text class="text" x="86" y="562">release note draft</text>

  <rect class="panel" x="390" y="286" width="210" height="120" />
  <text class="label" x="416" y="322">Runner</text>
  <text class="text" x="416" y="350">typed `UserId` + `SessionId`</text>
  <text class="small" x="416" y="376">streams final revision</text>

  <rect class="agent" x="690" y="244" width="220" height="170" />
  <text class="label" x="734" y="280">Refiner Agent</text>
  <text class="text" x="716" y="310">improve clarity</text>
  <text class="text" x="716" y="336">tighten structure</text>
  <text class="text" x="716" y="362">check quality bar</text>

  <rect class="tool" x="690" y="470" width="220" height="120" />
  <text class="label" x="738" y="506">ExitLoopTool</text>
  <text class="text" x="716" y="536">called when draft is</text>
  <text class="text" x="716" y="562">good enough</text>

  <rect class="panel" x="970" y="220" width="190" height="132" />
  <text class="label" x="1002" y="256">LoopAgent</text>
  <text class="text" x="996" y="286">max 5 iterations</text>
  <text class="small" x="996" y="314">safe retry boundary</text>

  <rect class="output" x="970" y="454" width="190" height="136" />
  <text class="label" x="1006" y="490">Final Copy</text>
  <text class="text" x="996" y="520">publishable version</text>
  <text class="small" x="996" y="548">or best effort at limit</text>

  <path class="arrow dashed" d="M320 320 L690 312" />
  <path class="arrow" d="M320 536 L390 346" />
  <path class="arrow" d="M600 346 L690 330" />
  <path class="arrow" d="M910 312 L970 286" />
  <path class="arrow dashed" d="M1065 352 L800 414" />
  <path class="arrow" d="M800 414 L800 470" />
  <path class="arrow" d="M910 530 L970 530" />
  <path class="arrow dashed" d="M970 286 L910 286" />

  <rect class="note" x="60" y="650" width="520" height="74" />
  <text class="label" x="84" y="682">Design Choice</text>
  <text class="small" x="84" y="706">Use an explicit exit tool and a max-iteration limit so the refinement loop is both inspectable and cost-bounded.</text>
</svg>
